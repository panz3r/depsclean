name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix (example: 1.2.3)"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          check-latest: true

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW_VERSION="${{ inputs.version }}"
            if [[ ! "$RAW_VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid version format: $RAW_VERSION" >&2
              exit 1
            fi
            APP_VERSION="${RAW_VERSION#v}"
            APP_TAG="v${APP_VERSION}"
          else
            APP_TAG="${GITHUB_REF#refs/tags/}"
            APP_VERSION="${APP_TAG#v}"
          fi

          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "APP_TAG=${APP_TAG}" >> "$GITHUB_ENV"

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/${APP_TAG}" | grep -q .; then
            echo "Tag ${APP_TAG} already exists on origin" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${APP_TAG}" -m "Release ${APP_TAG}" "${GITHUB_SHA}"
          git push origin "${APP_TAG}"

      - name: Build release binaries
        run: |
          mkdir -p builds

          build() {
            local goos="$1"
            local goarch="$2"
            local output="$3"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags "-s -w -X github.com/panz3r/depsclean/internal/update.Version=${APP_VERSION}" \
              -o "$output" ./cmd/depsclean
          }

          build linux amd64 builds/depsclean_linux_amd64
          build linux arm64 builds/depsclean_linux_arm64
          build darwin arm64 builds/depsclean_macos_arm64
          build darwin amd64 builds/depsclean_macos_intel
          build windows amd64 builds/depsclean_windows_amd64.exe
          build windows arm64 builds/depsclean_windows_arm64.exe

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.APP_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.APP_TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            builds/depsclean_linux_amd64
            builds/depsclean_linux_arm64
            builds/depsclean_macos_arm64
            builds/depsclean_macos_intel
            builds/depsclean_windows_amd64.exe
            builds/depsclean_windows_arm64.exe
